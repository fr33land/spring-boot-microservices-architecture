---
server:
    port: 8081

spring:
    application:
        name: webapp-service
    main:
        allow-bean-definition-overriding: true
    datasource:
        jdbcUrl: jdbc:postgresql://192.168.8.104:5432/freeland
        username: freeland
        password: freeland
        driverClassName: org.postgresql.Driver
    jpa:
        show-sql: true
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                temp:
                    use_jdbc_metadata_defaults: false
    thymeleaf:
        cache: false   
    profiles:
        active: local

security:
    basic:
        enabled: false
    oauth2:
        client:
            clientId: web-app
            clientSecret: web-app
            accessTokenUri: ${security.oauth2.resource.server-address}/uaa/oauth/token
            userAuthorizationUri: ${security.oauth2.resource.server-address}/uaa/oauth/authorize
#            pre-established-redirect-uri: http://localhost:8081/ui/userProfile
            registered-redirect-uri: http://localhost:8081/dashboard
#            use-current-uri: false
        resource:
            service-id: uaa-service
            userInfoUri: ${security.oauth2.resource.server-address}/uaa/user
            ssoLogoutUri: ${security.oauth2.resource.server-address}/uaa/ssoLogout
            tokenInvalidateUri: http://${security.oauth2.resource.service-id}/uaa/invalidateToken
      
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/     
            
logging:
    level:
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG