---
server:
    port: 8081
    servlet:
        context-path: /ui
    # servlet: for spring boot2
    # context-path: /ui

spring:
    application:
        name: webapp-service
    main:
        allow-bean-definition-overriding: true
    datasource:
        jdbcUrl: jdbc:postgresql://localhost:5432/freeland
        username: freeland
        password: freeland
        driverClassName: org.postgresql.Driver
    jpa:
        show-sql: true
    thymeleaf:
        cache: false   
    profiles:
        active: local

security:
    basic:
        enabled: false
    oauth2:
        client:
            clientId: webapp-server
            clientSecret: webapp-server
            accessTokenUri: ${security.oauth2.resource.server-address}/uaa/oauth/token
            userAuthorizationUri: ${security.oauth2.resource.server-address}/uaa/oauth/authorize
#            pre-established-redirect-uri: http://localhost:8081/ui/userProfile
#            registered-redirect-uri: http://localhost:8081/ui/userProfile
#            use-current-uri: false
        resource:
            service-id: uaa-service
            userInfoUri: ${security.oauth2.resource.server-address}/uaa/user
            ssoLogoutUri: ${security.oauth2.resource.server-address}/uaa/ssoLogout
            tokenInvalidateUri: http://${security.oauth2.resource.service-id}/uaa/invalidateToken
      
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/     
            
logging:
    level:
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG