---
server:
    port: 8081
    servlet:
        context-path: /ui
    # servlet: for spring boot2
    # context-path: /ui

spring:
    application:
        name: webapp-service
    thymeleaf:
        cache: false   
    profiles:
        active: freeland

security:
    basic:
        enabled: false
    oauth2:
        client:
            clientId: webapp-server
            clientSecret: webapp-server
            accessTokenUri: http://${security.oauth2.resource.service-id}/uaa/oauth/token
            userAuthorizationUri: http://${security.oauth2.resource.service-id}/uaa/oauth/authorize
#            pre-established-redirect-uri: http://localhost:8081/ui/userProfile
#            registered-redirect-uri: http://localhost:8081/ui/userProfile
#            use-current-uri: false
        resource:
            service-id: freeland.sytes.net:8089
            userInfoUri: http://${security.oauth2.resource.service-id}/uaa/user
            ssoLogoutUri: http://${security.oauth2.resource.service-id}/uaa/ssoLogout
            tokenInvalidateUri: http://${security.oauth2.resource.service-id}/uaa/invalidateToken
      
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/     
            
logging:
    level:
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG