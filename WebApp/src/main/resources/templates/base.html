<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"   
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
    <head>
        <title layout:title-pattern="$CONTENT_TITLE - $LAYOUT_TITLE">Base</title>
        <meta name="description" content=""/>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
        <link rel="stylesheet" type="text/css" href="https://bootswatch.com/4/sandstone/bootstrap.min.css"/>
        <link rel="stylesheet" type="text/css" th:href="@{/webjars/font-awesome/css/font-awesome.min.css}"/>
        <link rel="stylesheet" type="text/css" th:href="@{/webjars/datatables/css/dataTables.bootstrap4.min.css}"></link>
        <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    </head>
    <body>
        <div class="wrapper">
            <!-- Sidebar Holder -->
            <nav id="sidebar">
                <div class="sidebar-header">
                    <h3>Bootstrap Sidebar</h3>
                </div>

                <ul class="nav flex-column list-unstyled components">
                    <li class="nav-item active">
                        <a class="nav-link active" href="#" data-toggle="collapse" data-target="#adminSubmenu" aria-expanded="false">
                            <i class="fa fa-cog fa-fw" aria-hidden="true"></i>&nbsp;Administration
                        </a>
                        <ul id="adminSubmenu" class="collapse list-unstyled">
                            <li class="nav-item">
                                <a th:href="@{/admin/users}" class="nav-link active">Users</a>
                            </li> 
                            <li class="nav-item">
                                <a class="nav-link active" href="#">Roles</a>
                            </li> 
                            <li class="nav-item">
                                <a class="nav-link active" href="#">Permissions</a>
                            </li> 
                        </ul>
                    </li>                    
                    <li class="nav-item">
                        <a class="nav-link disabled" href="#">
                            <i class="fa fa-file" aria-hidden="true"></i>&nbsp; Disabled
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Page Content Holder -->
            <div id="content">
                <form th:action="@{/logout}" method="post" id="logoutform" th:fragment="header">
                    <nav class="navbar navbar-dark bg-primary navbar-collapse">
                        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarColor01" aria-controls="navbarColor01" aria-expanded="false" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>

                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                <span th:text="${session.loggedUser.fullName}"></span>
                            </button>
                            <div class="dropdown-menu">
                                <a class="dropdown-item" href="#">
                                    <i class="fa fa-sliders" aria-hidden="true"></i>&nbsp; Settings
                                </a>
                                <a class="dropdown-item" href="#" onclick="document.getElementById('logoutform').submit();">
                                    <i class="fa fa-sign-out" aria-hidden="true"></i>&nbsp; Logout
                                </a>                                
                            </div>
                        </div>
                    </nav>
                </form>

                <div id="page-content-wrapper">
                    <h2>Title</h2>
                    <div class="content">
                        <div layout:fragment="content"></div>
                    </div>
                </div>
            </div>
        </div>
        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
        <script th:src="@{/webjars/datatables/js/jquery.dataTables.min.js}"></script>
        <script th:src="@{/webjars/datatables/js/dataTables.bootstrap4.min.js}"></script>
        <script type="text/javascript">
            $(document).ready(function () {
                $('.navbar-toggler').on('click', function () {
                    $('#sidebar').toggleClass('active');
                    $('#content').toggleClass('active');
                });
            });
        </script>
        <th:block layout:fragment="script"></th:block>
    </body>
</html>
